name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: linkforge
          POSTGRES_PASSWORD: linkforge_test
          POSTGRES_DB: linkforge_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U linkforge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    env:
      DATABASE_URL: postgresql://linkforge:linkforge_test@localhost:5432/linkforge_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-de-al-menos-32-caracteres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run prisma:generate
      - run: npx prisma migrate deploy --schema=prisma/schema.prisma

      - run: npm run lint
      - run: npm run test
      - run: npm run build

  deploy-staging:
    needs: lint-test-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Build de imágenes + push a registry + deploy a staging (ver docs/10-DevOps.md)"
      # Pasos reales de despliegue se completan al aprovisionar la infraestructura
      # con Terraform (siguiente incremento de DevOps).
